name: OpenAI Codex

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt passed to codex-exec via stdin
        required: false
        default: Review and fix code quality issues in this repository.
      model:
        description: Codex model name
        required: false
        default: gpt-5.2-codex

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Ensure OPENAI_API_KEY is configured
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Missing OPENAI_API_KEY secret for OpenAI Codex workflow."
            exit 1
          fi
      - name: Run Codex
        uses: openai/codex-action@e0fdf01220eb9a88167c4898839d273e3f2609d1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: ${{ github.event.inputs.prompt || 'Fix issue' }}
          model: ${{ github.event.inputs.model || 'gpt-5.2-codex' }}
