name: OpenAI Codex

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt passed to codex-exec via stdin
        required: false
        default: Fix issue
      model:
        description: Codex model name
        required: false
        default: gpt-5.2-codex

jobs:
  codex-exec:
    runs-on: ubuntu-latest
    steps:
      - name: Run codex-exec with explicit stdin prompt
        env:
          CODEX_PROMPT: ${{ github.event.inputs.prompt || 'Fix issue' }}
          CODEX_MODEL: ${{ github.event.inputs.model || 'gpt-5.2-codex' }}
        run: |
          echo "$CODEX_PROMPT" | codex-exec --model "$CODEX_MODEL"
