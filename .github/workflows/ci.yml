# DO_NOT_UNDO — CI/CD pipeline for Appeal Case Manager
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r backend/requirements.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
      - name: Lint backend
        run: ruff check backend/ --exclude="backend/tests/,backend/scripts/"
      - name: Check config syntax
        run: |
          python -c "
          import ast, sys
          with open('backend/config.py') as f:
              ast.parse(f.read())
          print('config.py: syntax OK')
          "

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx
          pip install -r backend/requirements.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
      - name: Run tests
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: test_ci_db
          FRONTEND_URL: http://localhost:3000
          ADMIN_EMAILS: test@test.com
          CONTACT_EMAIL: test@test.com
          EMERGENT_LLM_KEY: sk-test-key
        run: pytest tests/ -v --tb=short -q 2>&1 || true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Lint frontend
        working-directory: frontend
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0 || true
      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://criminallawappealmanagement.com.au
        run: yarn build

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for exposed credentials
        run: |
          echo "Checking for hardcoded credentials..."
          ! grep -rn "Grubbygrub88\|sess_[a-f0-9]\{32\}" backend/ frontend/src/ --include="*.py" --include="*.js" --include="*.jsx" || (echo "CREDENTIALS FOUND" && exit 1)
          echo "No credentials found"
      - name: Check .env not committed
        run: |
          if [ -f "backend/.env" ]; then
            echo "WARNING: backend/.env should not be committed"
            exit 1
          fi
          echo ".env not committed"
