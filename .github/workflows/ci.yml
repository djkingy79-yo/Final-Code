---
# DO_NOT_UNDO — CI/CD pipeline for Appeal Case Manager
name: CI

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel older runs on the same ref as soon as a newer one starts.
# Saves GitHub Actions minutes and surfaces the latest result faster.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r backend/requirements.txt \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
      - name: Lint backend
        run: >-
          ruff check backend/
          --exclude="backend/tests/,backend/scripts/"
          --fix
          --exit-non-zero-on-fix
          --output-format=github
      - name: Check config syntax
        run: |
          python -c "
          import ast, sys
          with open('backend/config.py') as f:
              ast.parse(f.read())
          print('config.py: syntax OK')
          "

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx
          pip install -r backend/requirements.txt \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
      - name: Run unit tests (no server required)
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: test_ci_db
          FRONTEND_URL: http://localhost:3000
          ADMIN_EMAILS: test@test.com
          CONTACT_EMAIL: test@test.com
          EMERGENT_LLM_KEY: sk-test-key
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          pytest tests/test_offence_framework_integrity.py \
            tests/test_ground_dedup.py \
            tests/test_legislation_framework.py \
            -v --tb=short -q

  backend-integration-tests:
    runs-on: ubuntu-latest
    # Real MongoDB container — tests tagged @requires_mongo actually run here
    # instead of skipping as they do in backend-tests.
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx
          pip install -r backend/requirements.txt \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
      - name: Wait for MongoDB to be ready
        run: |
          for i in {1..30}; do
            if nc -z localhost 27017; then echo "Mongo is up"; exit 0; fi
            echo "Waiting for Mongo ($i/30)..."; sleep 1
          done
          echo "Mongo failed to come up"; exit 1
      - name: Run integration tests (requires MongoDB)
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: test_ci_db
          FRONTEND_URL: http://localhost:3000
          ADMIN_EMAILS: test@test.com
          CONTACT_EMAIL: test@test.com
          EMERGENT_LLM_KEY: sk-test-key
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          pytest tests/test_ground_dedup.py::test_cleanup_function \
            tests/test_ground_dedup.py::test_idempotent_sync \
            -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock
      - name: Install dependencies
        working-directory: frontend
        run: yarn install
      - name: Lint frontend
        working-directory: frontend
        run: >-
          npx eslint src/ --ext .js,.jsx
          --max-warnings 0
      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://criminallawappealmanagement.com.au
        run: yarn build

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check for exposed credentials
        run: |
          echo "Checking for hardcoded credentials..."
          ! grep -rn 'Grubbygrub88' \
            backend/ frontend/src/ \
            --include="*.py" \
            --include="*.js" \
            --include="*.jsx" \
            || (echo "CREDENTIALS FOUND" && exit 1)
          echo "No credentials found"
      - name: Check .env not committed
        run: |
          if [ -f "backend/.env" ]; then
            echo "WARNING: backend/.env should not be committed"
            exit 1
          fi
          echo ".env not committed"
