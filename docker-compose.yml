version: "3.8"

services:
  app:
    build:
      context: .
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    ports:
      - "8001:8001"
    env_file:
      - backend/.env
    # If the backend runs in Docker, MongoDB must be addressed by service name:
    #   MONGO_URL=mongodb://mongo:27017
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped

volumes:
  mongo_data:
